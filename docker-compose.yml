version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: job-hunter-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: job-hunter-adminer
    restart: always
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    depends_on:
      - db

  ollama:
    image: ollama/ollama:latest
    container_name: job-hunter-ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  ollama-init:
    image: curlimages/curl:latest
    container_name: job-hunter-ollama-init
    volumes:
      - ./docker/ollama-init.sh:/tmp/ollama-init.sh
    entrypoint: ["/bin/sh", "/tmp/ollama-init.sh"]
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma2:2b}
    depends_on:
      - ollama

  python-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: job-hunter-python-worker
    restart: always
    ports:
      - "${WORKER_PORT:-8000}:8000"
    volumes:
      - ./scripts:/app/scripts
      - ./resumes:/app/resumes
      - ./reports:/app/reports
      - ./logs:/app/logs
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: job-hunter-n8n
    restart: always
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      - N8N_PORT=${N8N_PORT:-5678}
      - N8N_SECURE_COOKIE=false
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/app/workflows
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  ollama_data:
    driver: local
  n8n_data:
    driver: local
